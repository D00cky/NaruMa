# NaruMa — Hyprlock (lock screen)

general {
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = ~/.config/hypr/wallpaper
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    outer_color = rgb(45475a)
    inner_color = rgb(1e1e2e)
    font_color = rgb(cdd6f4)
    fade_on_empty = false
    placeholder_text =
    hide_input = false
    rounding = 0

    check_color = rgb(a6e3a1)
    fail_color = rgb(f38ba8)
    fail_text = $FAIL ($ATTEMPTS)

    position = 0, -60
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    color = rgba(cdd6f4cc)
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    color = rgba(bac2dead)
    position = 0, -20
    halign = center
    valign = center
}
