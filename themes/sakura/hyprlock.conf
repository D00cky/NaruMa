# NaruMa — Hyprlock (Sakura)

general {
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = ~/.config/hypr/wallpaper
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    outer_color = rgb(3d2b44)
    inner_color = rgb(1a0e1e)
    font_color = rgb(f2d4e0)
    fade_on_empty = false
    placeholder_text =
    hide_input = false
    rounding = 0

    check_color = rgb(80cbc4)
    fail_color = rgb(ef9a9a)
    fail_text = $FAIL ($ATTEMPTS)

    position = 0, -60
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    color = rgba(f2d4e0cc)
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    color = rgba(d4aabbad)
    position = 0, -20
    halign = center
    valign = center
}
