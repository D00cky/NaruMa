# NaruMa — Hyprlock (Cyberpunk)

general {
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = ~/.config/hypr/wallpaper
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    outer_color = rgb(16213e)
    inner_color = rgb(0d0d1a)
    font_color = rgb(e0e0ff)
    fade_on_empty = false
    placeholder_text =
    hide_input = false
    rounding = 0

    check_color = rgb(39ff14)
    fail_color = rgb(ff0055)
    fail_text = $FAIL ($ATTEMPTS)

    position = 0, -60
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    color = rgba(00f5ffcc)
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    color = rgba(a0a0d0ad)
    position = 0, -20
    halign = center
    valign = center
}
