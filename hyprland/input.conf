# NaruMa — Input

input {
    kb_layout  = us
    kb_variant =
    kb_model   =
    kb_options = compose:caps
    kb_rules   =

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll    = false
        tap-to-click      = true
        drag_lock         = true
        scroll_factor     = 0.8
    }
}

gestures {
    gesture = 3, horizontal, workspace
    workspace_swipe_cancel_ratio = 0.15
}

misc {
    key_press_enables_dpms   = true
    mouse_move_enables_dpms  = true
}
