# NaruMa — Keybindings
# Inspired by Omarchy

$mod = SUPER

# --- Applications ---
bindd = $mod,       RETURN,       Terminal,              exec, xdg-terminal-exec
bindd = $mod ALT,   RETURN,       Tmux,                  exec, xdg-terminal-exec bash -c "tmux attach || tmux new -s main"
bindd = $mod SHIFT, RETURN,       Browser,               exec, xdg-open https://
bindd = $mod SHIFT, F,            File manager,          exec, nautilus --new-window
bindd = $mod SHIFT, N,            Editor,                exec, xdg-terminal-exec nvim
bindd = $mod SHIFT, D,            Docker,                exec, xdg-terminal-exec lazydocker
bindd = $mod SHIFT, SLASH,        Passwords,             exec, 1password

# --- Launcher & menus ---
bindd = $mod,       SPACE,        Launch apps,           exec, rofi -show drun -show-icons
bindd = $mod SHIFT, SPACE,        Toggle top bar,        exec, pkill -USR1 waybar
bindd = $mod CTRL,  E,            Emoji picker,          exec, rofi -show emoji
bindd = $mod,       K,            Show keybindings,      exec, rofi -show keybindings

# --- Window management ---
bindd = $mod,       W,            Close window,          killactive
bindd = $mod,       T,            Toggle float,          togglefloating
bindd = $mod,       F,            Fullscreen,            fullscreen, 0
bindd = $mod CTRL,  F,            Tiled fullscreen,      fullscreenstate, 0 2
bindd = $mod ALT,   F,            Maximize,              fullscreen, 1
bindd = $mod,       P,            Pseudo tile,           pseudo
bindd = $mod,       J,            Toggle split,          layoutmsg, togglesplit
bindd = $mod,       O,            Pin/float window,      exec, hyprctl dispatch togglefloating && hyprctl dispatch pin

# --- Focus ---
bindd = $mod, LEFT,  Focus left,  movefocus, l
bindd = $mod, RIGHT, Focus right, movefocus, r
bindd = $mod, UP,    Focus up,    movefocus, u
bindd = $mod, DOWN,  Focus down,  movefocus, d

# --- Move windows ---
bindd = $mod SHIFT, LEFT,  Move window left,  swapwindow, l
bindd = $mod SHIFT, RIGHT, Move window right, swapwindow, r
bindd = $mod SHIFT, UP,    Move window up,    swapwindow, u
bindd = $mod SHIFT, DOWN,  Move window down,  swapwindow, d

# --- Resize ---
bindd = $mod,       code:20, Shrink width,    resizeactive, -80 0
bindd = $mod,       code:21, Grow width,      resizeactive,  80 0
bindd = $mod SHIFT, code:20, Shrink height,   resizeactive, 0 -80
bindd = $mod SHIFT, code:21, Grow height,     resizeactive, 0  80

# --- Workspaces ---
bindd = $mod, code:10, Workspace 1,  workspace, 1
bindd = $mod, code:11, Workspace 2,  workspace, 2
bindd = $mod, code:12, Workspace 3,  workspace, 3
bindd = $mod, code:13, Workspace 4,  workspace, 4
bindd = $mod, code:14, Workspace 5,  workspace, 5
bindd = $mod, code:15, Workspace 6,  workspace, 6
bindd = $mod, code:16, Workspace 7,  workspace, 7
bindd = $mod, code:17, Workspace 8,  workspace, 8
bindd = $mod, code:18, Workspace 9,  workspace, 9
bindd = $mod, code:19, Workspace 10, workspace, 10

# Move window to workspace
bindd = $mod SHIFT, code:10, Move to workspace 1,  movetoworkspace, 1
bindd = $mod SHIFT, code:11, Move to workspace 2,  movetoworkspace, 2
bindd = $mod SHIFT, code:12, Move to workspace 3,  movetoworkspace, 3
bindd = $mod SHIFT, code:13, Move to workspace 4,  movetoworkspace, 4
bindd = $mod SHIFT, code:14, Move to workspace 5,  movetoworkspace, 5
bindd = $mod SHIFT, code:15, Move to workspace 6,  movetoworkspace, 6
bindd = $mod SHIFT, code:16, Move to workspace 7,  movetoworkspace, 7
bindd = $mod SHIFT, code:17, Move to workspace 8,  movetoworkspace, 8
bindd = $mod SHIFT, code:18, Move to workspace 9,  movetoworkspace, 9
bindd = $mod SHIFT, code:19, Move to workspace 10, movetoworkspace, 10

# Move window silently
bindd = $mod ALT SHIFT, code:10, Silent move to workspace 1,  movetoworkspacesilent, 1
bindd = $mod ALT SHIFT, code:11, Silent move to workspace 2,  movetoworkspacesilent, 2
bindd = $mod ALT SHIFT, code:12, Silent move to workspace 3,  movetoworkspacesilent, 3
bindd = $mod ALT SHIFT, code:13, Silent move to workspace 4,  movetoworkspacesilent, 4
bindd = $mod ALT SHIFT, code:14, Silent move to workspace 5,  movetoworkspacesilent, 5
bindd = $mod ALT SHIFT, code:15, Silent move to workspace 6,  movetoworkspacesilent, 6
bindd = $mod ALT SHIFT, code:16, Silent move to workspace 7,  movetoworkspacesilent, 7
bindd = $mod ALT SHIFT, code:17, Silent move to workspace 8,  movetoworkspacesilent, 8
bindd = $mod ALT SHIFT, code:18, Silent move to workspace 9,  movetoworkspacesilent, 9
bindd = $mod ALT SHIFT, code:19, Silent move to workspace 10, movetoworkspacesilent, 10

# Navigate workspaces
bindd = $mod,       TAB,   Next workspace,     workspace, e+1
bindd = $mod SHIFT, TAB,   Prev workspace,     workspace, e-1
bindd = $mod CTRL,  TAB,   Last workspace,     workspace, previous

# Scroll through workspaces
bindd = $mod, mouse_down, Next workspace, workspace, e+1
bindd = $mod, mouse_up,   Prev workspace, workspace, e-1

# Move workspace to monitor
bindd = $mod SHIFT ALT, LEFT,  Move workspace to left monitor,  movecurrentworkspacetomonitor, l
bindd = $mod SHIFT ALT, RIGHT, Move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = $mod SHIFT ALT, UP,    Move workspace to upper monitor, movecurrentworkspacetomonitor, u
bindd = $mod SHIFT ALT, DOWN,  Move workspace to lower monitor, movecurrentworkspacetomonitor, d

# --- Scratchpad ---
bindd = $mod,     S, Toggle scratchpad,      togglespecialworkspace, scratchpad
bindd = $mod ALT, S, Move to scratchpad,     movetoworkspacesilent, special:scratchpad

# --- Groups ---
bindd = $mod,       G,   Toggle group,              togglegroup
bindd = $mod ALT,   G,   Move out of group,         moveoutofgroup
bindd = $mod ALT,   TAB, Next in group,             changegroupactive, f
bindd = $mod ALT SHIFT, TAB, Prev in group,         changegroupactive, b
bindd = $mod CTRL,  LEFT,  Prev grouped window,     changegroupactive, b
bindd = $mod CTRL,  RIGHT, Next grouped window,     changegroupactive, f
bindd = $mod ALT,   LEFT,  Move into left group,    moveintogroup, l
bindd = $mod ALT,   RIGHT, Move into right group,   moveintogroup, r
bindd = $mod ALT,   UP,    Move into upper group,   moveintogroup, u
bindd = $mod ALT,   DOWN,  Move into lower group,   moveintogroup, d

# --- Cycle windows on workspace ---
bindd = ALT,       TAB,   Cycle to next window, cyclenext
bindd = ALT SHIFT, TAB,   Cycle to prev window, cyclenext, prev
bind  = ALT,       TAB,   bringactivetotop
bind  = ALT SHIFT, TAB,   bringactivetotop

# --- Mouse: move/resize ---
bindmd = $mod, mouse:272, Move window,   movewindow
bindmd = $mod, mouse:273, Resize window, resizewindow

# --- Notifications ---
bindd = $mod,       COMMA,   Dismiss last notification,    exec, makoctl dismiss
bindd = $mod SHIFT, COMMA,   Dismiss all notifications,    exec, makoctl dismiss --all
bindd = $mod ALT,   COMMA,   Invoke last notification,     exec, makoctl invoke
bindd = $mod SHIFT ALT, COMMA, Restore last notification,  exec, makoctl restore

# --- Screenshots & screen capture ---
bindd = ,       PRINT,   Screenshot,                exec, grimblast copy area
bindd = ALT,    PRINT,   Screenshot full screen,    exec, grimblast copy screen
bindd = $mod,   PRINT,   Color picker,              exec, pkill hyprpicker || hyprpicker -a

# --- Clipboard history ---
bindd = $mod CTRL, V,   Clipboard history,   exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# --- Aesthetics ---
bindd = $mod,       BACKSPACE,   Toggle window transparency, exec, hyprctl dispatch setprop "address:$(hyprctl activewindow -j | jq -r '.address')" opaque toggle
bindd = $mod SHIFT, BACKSPACE,   Toggle window gaps,         exec, hyprctl keyword general:gaps_out $(($(hyprctl getoption general:gaps_out -j | jq '.int') == 0 ? 10 : 0)) && hyprctl keyword general:gaps_in $(($(hyprctl getoption general:gaps_in -j | jq '.int') == 0 ? 5 : 0))

# --- Toggles ---
bindd = $mod CTRL, L,   Lock screen,          exec, hyprlock
bindd = $mod CTRL, I,   Toggle idle inhibit,  exec, hyprctl dispatch toggledpms

# --- Media keys ---
$osd = swayosd-client

bindeld = , XF86AudioRaiseVolume,  Volume up,            exec, $osd --output-volume raise
bindeld = , XF86AudioLowerVolume,  Volume down,          exec, $osd --output-volume lower
bindeld = , XF86AudioMute,         Mute,                 exec, $osd --output-volume mute-toggle
bindeld = , XF86AudioMicMute,      Mute mic,             exec, $osd --input-volume mute-toggle
bindeld = , XF86MonBrightnessUp,   Brightness up,        exec, brightnessctl set +5%
bindeld = , XF86MonBrightnessDown, Brightness down,      exec, brightnessctl set 5%-

bindld = , XF86AudioNext,  Next track,   exec, $osd --playerctl next
bindld = , XF86AudioPause, Pause,        exec, $osd --playerctl play-pause
bindld = , XF86AudioPlay,  Play,         exec, $osd --playerctl play-pause
bindld = , XF86AudioPrev,  Prev track,   exec, $osd --playerctl previous

# Precise 1% adjustments
bindeld = ALT, XF86AudioRaiseVolume,  Volume +1%,        exec, $osd --output-volume +1
bindeld = ALT, XF86AudioLowerVolume,  Volume -1%,        exec, $osd --output-volume -1
bindeld = ALT, XF86MonBrightnessUp,   Brightness +1%,    exec, brightnessctl set +1%
bindeld = ALT, XF86MonBrightnessDown, Brightness -1%,    exec, brightnessctl set 1%-

# Power / system
bindld = , XF86PowerOff, Power menu, exec, systemctl poweroff
