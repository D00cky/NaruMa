# NaruMa — Window rules (Hyprland 0.53+ block syntax)

# Suppress maximize requests (apps should not force fullscreen)
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# Fix XWayland drag issues (e.g. DnD overlays with no class/title)
windowrule {
    name = fix-xwayland-drag
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Default opacity: 97% active / 90% inactive for all windows
windowrule {
    name = default-opacity
    match:class = .*
    opacity = 0.97 0.90
}

# Terminals — full opacity (overrides default; must come after)
windowrule {
    name = terminal-opacity
    match:class = ^(Alacritty|kitty|ghostty|foot|wezterm)$
    opacity = 1.0 0.95
}

# Floating apps
windowrule {
    name = float-tools
    match:class = ^(pavucontrol|blueman-manager|nm-connection-editor|gnome-calculator)$
    float = yes
}

windowrule {
    name = float-media
    match:class = ^(imv|mpv|feh)$
    float = yes
}

# Picture-in-Picture
windowrule {
    name = pip
    match:title = ^(Picture-in-Picture)$
    float = yes
    pin = yes
}

# Dialogs always float
windowrule {
    name = float-dialogs
    match:initialtitle = ^(Open File|Save File|Save As|Print)$
    float = yes
}

# File manager
windowrule {
    name = nautilus
    match:class = ^(org.gnome.Nautilus)$
    float = yes
    size = 900 600
    center = yes
}

# 1Password
windowrule {
    name = 1password
    match:class = ^(1Password)$
    float = yes
    center = yes
}

# Scratchpad terminal
windowrule {
    name = scratchterm
    match:class = ^(scratchterm)$
    float = yes
    size = 1200 700
    center = yes
}

# Idle inhibit for video players
windowrule {
    name = idleinhibit-video
    match:class = ^(mpv|vlc)$
    idleinhibit = focus
}

# Idle inhibit when any window is fullscreen
windowrule {
    name = idleinhibit-fullscreen
    match:class = .*
    match:fullscreen = true
    idleinhibit = always
}
