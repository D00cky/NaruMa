# NaruMa — Window rules

# Suppress maximize requests (apps should not force fullscreen)
windowrule = suppress_event maximize, class:.*

# Fix XWayland drag issues
windowrule = no_focus on, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0

# Default opacity: 97% active / 90% inactive for all windows
windowrule = tag +default-opacity, class:.*
windowrule = opacity 0.97 0.90, tag:default-opacity

# Terminals — full opacity
windowrule = tag -default-opacity, class:^(Alacritty|kitty|ghostty|foot|wezterm)$
windowrule = opacity 1.0 0.95, class:^(Alacritty|kitty|ghostty|foot|wezterm)$

# Floating apps
windowrule = float, class:^(pavucontrol|blueman-manager|nm-connection-editor|gnome-calculator)$
windowrule = float, class:^(imv|mpv|feh)$
windowrule = float, title:^(Picture-in-Picture)$
windowrule = pin,   title:^(Picture-in-Picture)$

# Dialogs always float
windowrule = float, initialtitle:^(Open File|Save File|Save As|Print)$

# File manager
windowrule = float,    class:^(org.gnome.Nautilus)$
windowrule = size 900 600, class:^(org.gnome.Nautilus)$
windowrule = center,   class:^(org.gnome.Nautilus)$

# 1Password
windowrule = float,    class:^(1Password)$
windowrule = center,   class:^(1Password)$

# Scratchpad terminal
windowrule = float,       class:^(scratchterm)$
windowrule = size 1200 700, class:^(scratchterm)$
windowrule = center,      class:^(scratchterm)$

# Idle inhibit for video
windowrule = idleinhibit focus, class:^(mpv|vlc)$
windowrule = idleinhibit fullscreen, class:.*
