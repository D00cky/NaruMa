# NaruMa — Window rules

# Suppress maximize requests (apps should not force fullscreen)
windowrule = suppress_event maximize, match:class .*

# Fix XWayland drag issues
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# Default opacity: 97% active / 90% inactive for all windows
windowrule = tag +default-opacity, match:class .*
windowrule = opacity 0.97 0.90, match:tag default-opacity

# Terminals — full opacity
windowrule = tag -default-opacity, match:class ^(Alacritty|kitty|ghostty|foot|wezterm)$
windowrule = opacity 1.0 0.95, match:class ^(Alacritty|kitty|ghostty|foot|wezterm)$

# Floating apps
windowrule = float, match:class ^(pavucontrol|blueman-manager|nm-connection-editor|gnome-calculator)$
windowrule = float, match:class ^(imv|mpv|feh)$
windowrule = float, match:title ^(Picture-in-Picture)$
windowrule = pin,   match:title ^(Picture-in-Picture)$

# Dialogs always float
windowrule = float, match:initialTitle ^(Open File|Save File|Save As|Print)$

# File manager
windowrule = float,    match:class ^(org.gnome.Nautilus)$
windowrule = size 900 600, match:class ^(org.gnome.Nautilus)$
windowrule = center,   match:class ^(org.gnome.Nautilus)$

# 1Password
windowrule = float,    match:class ^(1Password)$
windowrule = center,   match:class ^(1Password)$

# Scratchpad terminal
windowrule = float,       match:class ^(scratchterm)$
windowrule = size 1200 700, match:class ^(scratchterm)$
windowrule = center,      match:class ^(scratchterm)$

# Idle inhibit for video
windowrule = idleinhibit focus, match:class ^(mpv|vlc)$
windowrule = idleinhibit fullscreen, match:class .*
