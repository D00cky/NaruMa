# NaruMa — Hyprland config
# Inspired by Omarchy (https://github.com/basecamp/omarchy)

# Ensure NaruMa scripts are always findable from keybindings
env = PATH, $HOME/.config/naruma/bin:/usr/local/sbin:/usr/local/bin:/usr/bin:/usr/bin/site_perl:/usr/bin/vendor_perl:/usr/bin/core_perl

source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/rules.conf

# Override monitors in monitors.conf (auto by default)
source = ~/.config/hypr/monitors.conf
