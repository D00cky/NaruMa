# NaruMa — Alacritty

import = ["~/.config/alacritty/naruma-colors.toml"]

[font]
size = 12.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style  = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style  = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style  = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style  = "Bold Italic"

# ── Window ────────────────────────────────────────────────────────────────────

[window]
padding          = { x = 12, y = 10 }
decorations      = "None"
opacity          = 1.0
dynamic_padding  = false

[scrolling]
history    = 10000
multiplier = 3

# ── Keyboard ──────────────────────────────────────────────────────────────────

[[keyboard.bindings]]
key   = "Return"
mods  = "Shift"
chars = "\u001B\r"
